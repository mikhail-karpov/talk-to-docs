services:
  postgres:
    image: 'pgvector/pgvector:pg16'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docs_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ch4ngeMe_local}
      POSTGRES_DB: ${POSTGRES_DB:-talk_to_docs}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: