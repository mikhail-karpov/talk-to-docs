app:
  ai:
    text-splitter:
      chunk-size: 800
      min-chunk-size-chars: 350
      min-chunk-length-to-embed: 5
      max-num-chunks: 10000
      keep-separator: true
  frontend:
    url: http://localhost:5173

logging:
  level:
    com.mikhailkarpov: debug

spring:
  ai:
    ollama:
      chat:
        model: qwen2.5
      embedding:
        model: nomic-embed-text
      init:
        pull-model-strategy: when_missing
  application:
    name: docs-service
  main:
    banner-mode: off
  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 30s
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 1MB
