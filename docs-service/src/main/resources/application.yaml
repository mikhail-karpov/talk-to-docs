app:
  ai:
    text-splitter:
      chunk-size: 800
      min-chunk-size-chars: 350
      min-chunk-length-to-embed: 5
      max-num-chunks: 10000
      keep-separator: true
  frontend:
    url: http://localhost:5173

logging:
  level:
    com.mikhailkarpov: debug

spring:
  application:
    name: docs-service
  profiles:
    default: ollama
  ai:
    model:
      audio:
        speech: none
        transcription: none
      image: none
      moderation: none
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      pgvector:
        initialize-schema: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:talk_to_docs}
    username: ${POSTGRES_USER:docs_service}
    password: ${POSTGRES_PASSWORD:ch4ngeMe_local}
  main:
    banner-mode: off
  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 30s
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
