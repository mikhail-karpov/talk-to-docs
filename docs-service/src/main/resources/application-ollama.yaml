spring:
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      chat:
        model: qwen2.5
      embedding:
        model: nomic-embed-text
      init:
        pull-model-strategy: when_missing
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
